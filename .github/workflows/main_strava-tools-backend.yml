# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Backend

on:
  push:
    branches:
      - main
    paths-ignore:
    - 'API/**'
    - 'API.Tests/**'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'Backend' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use
  AZURE_RESOURCE_GROUP: 'strava'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4
        with: 
          submodules: true

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet publish Backend.csproj --configuration Release --output ./output
          popd
      
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EC2484218DDA436AA7B69FD2828FA153 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6CB4BA37185D4E68AF0BA4324D4F7674 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_99F738EDB16C45E081FBB7DFCD393188 }}

      - name: 'Archive Function App output'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
          zip -r ../output.zip .
          popd

      - name: 'Remove WEBSITE_RUN_FROM_PACKAGE setting'
        shell: bash
        run: |
          az webapp config appsettings delete \
            --name 'strava-tools-backend' \
            --resource-group '${{ env.AZURE_RESOURCE_GROUP }}' \
            --setting-names WEBSITE_RUN_FROM_PACKAGE || true

      - name: 'Deploy Function App with Azure CLI'
        shell: bash
        run: |
          az functionapp deployment source config-zip \
            --name 'strava-tools-backend' \
            --resource-group '${{ env.AZURE_RESOURCE_GROUP }}' \
            --src '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output.zip'
          
