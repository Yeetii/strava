name: Build and deploy RaceTileJob container

on:
  push:
    branches:
      - main
    paths:
      - 'RaceTileJob/**'
      - 'Shared/**'
      - '.dockerignore'
  pull_request:
    branches:
      - main
    paths:
      - 'RaceTileJob/**'
      - 'Shared/**'
      - '.dockerignore'
  workflow_dispatch:

env:
  ACR_NAME: 'strava'
  ACR_REGISTRY: 'strava.azurecr.io'
  ACR_REPOSITORY: 'strava-backend'
  AZURE_CONTAINERAPP_NAME: 'strava-container-app'
  AZURE_RESOURCE_GROUP: 'strava'

jobs:
  build-and-deploy:
    name: Build and push RaceTileJob container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EC2484218DDA436AA7B69FD2828FA153 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6CB4BA37185D4E68AF0BA4324D4F7674 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_99F738EDB16C45E081FBB7DFCD393188 }}

      - name: Login to ACR
        run: |
          az acr login --name "${{ env.ACR_NAME }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: RaceTileJob/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to Azure Container App
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            az account set --subscription ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_99F738EDB16C45E081FBB7DFCD393188 }}
            az containerapp update \
              --name ${{ env.AZURE_CONTAINERAPP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${{ github.sha }}
