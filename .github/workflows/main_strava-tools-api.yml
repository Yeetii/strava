# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy API

on:
  push:
    branches:
      - main
    paths-ignore:
    - 'Backend/**'
    - 'Backend.Tests/**'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'API' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '10.0.x' # set this to the dotnet version to use
  AZURE_RESOURCE_GROUP: 'strava'
  AZURE_FUNCTIONAPP_NAME: 'strava-tools-api-flex'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet publish --configuration Release --output ./output
          popd
      
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EC2484218DDA436AA7B69FD2828FA153 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6CB4BA37185D4E68AF0BA4324D4F7674 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_99F738EDB16C45E081FBB7DFCD393188 }}

      - name: 'Configure Function App runtime settings'
        shell: bash
        run: |
          set -euo pipefail

          az functionapp config appsettings set \
            --name '${{ env.AZURE_FUNCTIONAPP_NAME }}' \
            --resource-group '${{ env.AZURE_RESOURCE_GROUP }}' \
            --settings FUNCTIONS_EXTENSION_VERSION=~4 WEBSITE_USE_PLACEHOLDER_DOTNETISOLATED=1

          az functionapp runtime config set \
            --name '${{ env.AZURE_FUNCTIONAPP_NAME }}' \
            --resource-group '${{ env.AZURE_RESOURCE_GROUP }}' \
            --runtime-version 10.0

      - name: 'Deploy Function App'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
          sku: flexconsumption
          remote-build: false
          
